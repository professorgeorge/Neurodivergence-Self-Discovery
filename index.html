<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mosaic Mind — Neurodivergence Self-Discovery</title>
<meta name="description" content="A free, science-based self-assessment covering autism, ADHD, dyslexia, dyscalculia, dyspraxia, sensory sensitivity, and executive function. 73 questions for adults.">
<meta property="og:title" content="Mosaic Mind — Neurodivergence Self-Discovery">
<meta property="og:description" content="A gentle, comprehensive starting point for understanding your own mind. Covers 7 areas of neurodivergence in a single flow. Free and science-based.">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="Mosaic Mind — Neurodivergence Self-Discovery">
<meta name="twitter:description" content="Free, science-based self-assessment for autism, ADHD, dyslexia, dyscalculia, dyspraxia, sensory sensitivity and executive function.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,300;1,9..144,400&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Lexend:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --cream:#FFF8F0;--peach:#FFE8D6;--sage:#B7C9A8;--deep-sage:#7A9B68;
  --terra:#C4704B;--soft-terra:#D4956A;--forest:#2D4A3E;--brown:#5C4033;
  --lav:#C9B8D9;--gold:#C9A96E;--lt-sage:#E8F0E3;
  --txt:#3A3028;--txt2:#6B5D52;--txt3:#8E7F73;
  --card:rgba(255,255,255,0.75);--border:rgba(183,201,168,0.3);
  --shd:0 4px 24px rgba(93,64,55,0.06);--shd2:0 8px 32px rgba(93,64,55,0.10);
  --r:16px;--rs:10px;--rl:24px;
}
[data-theme="dark"]{
  --cream:#1a1a1a;--peach:#2a2420;--sage:#4a5e42;--deep-sage:#6a9058;
  --forest:#a8c8a0;--brown:#c8a888;--lt-sage:#252e22;
  --txt:#e8e0d8;--txt2:#b8a898;--txt3:#887868;
  --card:rgba(40,38,35,0.85);--border:rgba(100,120,90,0.25);
  --shd:0 4px 24px rgba(0,0,0,0.2);--shd2:0 8px 32px rgba(0,0,0,0.3);
}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--txt);line-height:1.65;min-height:100vh;overflow-x:hidden;transition:background 0.4s,color 0.4s}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse at 15% 20%,rgba(183,201,168,0.2) 0%,transparent 50%),radial-gradient(ellipse at 85% 80%,rgba(201,184,217,0.15) 0%,transparent 50%),radial-gradient(ellipse at 50% 50%,rgba(255,232,214,0.2) 0%,transparent 60%)}
[data-theme="dark"] body::before{opacity:0.3}
.app{position:relative;z-index:1;max-width:760px;margin:0 auto;padding:24px 20px 80px}
h1,h2,h3{font-family:'Fraunces',serif;font-weight:600;line-height:1.25}
h1{font-size:clamp(2rem,5vw,2.8rem);color:var(--forest)}
h2{font-size:clamp(1.4rem,3.5vw,1.85rem);color:var(--forest)}
h3{font-size:1.15rem;color:var(--brown);font-weight:600}
p{color:var(--txt2);font-size:1.02rem}

@keyframes slideIn{from{opacity:0;transform:translateX(24px)}to{opacity:1;transform:translateX(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes optPulse{0%{transform:scale(1)}40%{transform:scale(1.015)}100%{transform:scale(1)}}
@keyframes gentleBreathe{0%,100%{opacity:0.6}50%{opacity:1}}

.card{background:var(--card);backdrop-filter:blur(10px);border:1px solid var(--border);border-radius:var(--rl);padding:32px;box-shadow:var(--shd);transition:box-shadow 0.3s,background 0.4s}

.brand{text-align:center;padding:40px 0 16px}
.brand-icon{display:inline-flex;align-items:center;justify-content:center;width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,var(--sage),var(--lav));margin-bottom:14px;font-size:32px;color:white;text-shadow:0 1px 3px rgba(0,0,0,0.15)}
.brand h1 span{display:block;font-size:0.42em;font-family:'DM Sans',sans-serif;font-weight:400;color:var(--txt3);letter-spacing:0.08em;text-transform:uppercase;margin-top:6px}

.welcome-text{text-align:center;max-width:620px;margin:0 auto 28px}
.welcome-text p{font-size:1.06rem;line-height:1.75}
.hl{color:var(--deep-sage);font-weight:500}

.disc-box{background:linear-gradient(135deg,var(--lt-sage),rgba(201,184,217,0.1));border-radius:var(--r);padding:20px 24px;margin-bottom:24px;border-left:4px solid var(--sage)}
.disc-box p{font-size:0.91rem;color:var(--txt2);line-height:1.6}
.disc-box strong{color:var(--forest)}

/* Recognition quotes */
.recog-quotes{max-width:560px;margin:0 auto 28px;text-align:center}
.recog-q{font-family:'Fraunces',serif;font-style:italic;font-size:0.95rem;color:var(--txt3);line-height:1.6;padding:8px 0;opacity:0;animation:fadeUp 0.6s ease-out forwards}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:14px 32px;border-radius:50px;border:none;font-family:'DM Sans',sans-serif;font-size:1rem;font-weight:500;cursor:pointer;transition:all 0.3s}
.btn-p{background:linear-gradient(135deg,var(--deep-sage),var(--forest));color:white;box-shadow:0 4px 16px rgba(45,74,62,0.25)}
.btn-p:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(45,74,62,0.3)}
.btn-p:disabled{opacity:0.4;cursor:not-allowed;transform:none}
.btn-s{background:var(--card);color:var(--forest);border:1.5px solid var(--sage)}
.btn-s:hover{background:var(--lt-sage)}
.btn-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:24px}

/* Progress */
.prog-wrap{margin-bottom:28px}
.prog-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.prog-top span{font-size:0.85rem;color:var(--txt3);font-weight:500}
.prog-top .sec-label{color:var(--deep-sage);font-weight:600}
.prog-bar{height:6px;background:var(--peach);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--sage),var(--deep-sage));border-radius:3px;transition:width 0.5s ease}

/* Section transition */
.section-transition{text-align:center;animation:fadeIn 0.5s ease-out;padding:40px 20px}
.section-transition .st-icon{font-size:40px;margin-bottom:16px}
.section-transition h2{margin-bottom:12px;font-size:1.4rem}
.section-transition p{max-width:480px;margin:0 auto;font-size:0.98rem;line-height:1.7}
.section-transition .st-cta{margin-top:28px}

/* Question card */
.qc{animation:slideIn 0.35s ease-out}
.q-num{font-size:0.82rem;color:var(--txt3);margin-bottom:6px;font-weight:500}
.q-tag{display:inline-block;font-size:0.72rem;text-transform:uppercase;letter-spacing:0.05em;padding:3px 10px;border-radius:20px;margin-bottom:12px;font-weight:600}
.q-multi-tag{display:inline-block;font-size:0.65rem;padding:2px 8px;border-radius:12px;background:rgba(201,169,110,0.15);color:var(--gold);margin-left:6px;font-weight:500}
.q-text{font-family:'Fraunces',serif;font-size:1.18rem;color:var(--forest);margin-bottom:22px;line-height:1.5;font-weight:400}
.opts{display:flex;flex-direction:column;gap:9px}
.opt{text-align:left;padding:13px 18px;border-radius:var(--rs);border:1.5px solid var(--border);background:var(--card);font-family:'DM Sans',sans-serif;font-size:0.97rem;color:var(--txt);cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:space-between}
.opt:hover{border-color:var(--sage);background:var(--lt-sage)}
.opt.sel{border-color:var(--deep-sage);background:var(--lt-sage);font-weight:500;color:var(--forest);animation:optPulse 0.3s ease-out}

/* Resonance bookmark */
.q-footer{display:flex;justify-content:space-between;align-items:center;margin-top:22px}
.resonate-btn{display:flex;align-items:center;gap:6px;padding:6px 14px;border-radius:20px;border:1.5px solid var(--border);background:transparent;font-family:'DM Sans',sans-serif;font-size:0.82rem;color:var(--txt3);cursor:pointer;transition:all 0.25s;user-select:none}
.resonate-btn:hover{border-color:var(--soft-terra);color:var(--soft-terra)}
.resonate-btn.active{border-color:var(--soft-terra);background:rgba(212,149,106,0.1);color:var(--soft-terra);font-weight:500}
.resonate-btn .heart{transition:transform 0.25s}
.resonate-btn.active .heart{transform:scale(1.2)}
.qnav{display:flex;align-items:center;gap:12px}
.nb{padding:10px 22px;border-radius:50px;border:none;font-family:'DM Sans',sans-serif;font-size:0.92rem;font-weight:500;cursor:pointer;transition:all 0.25s}
.nb-prev{background:transparent;color:var(--txt3);border:1.5px solid var(--border)}
.nb-prev:hover{background:var(--card);color:var(--txt)}
.nb-next{background:var(--deep-sage);color:white}
.nb-next:hover{background:var(--forest)}
.nb:disabled{opacity:0.35;cursor:not-allowed}
.q-hint{font-size:0.82rem;color:var(--txt3)}

/* Results */
.res-intro{text-align:center;margin-bottom:32px}
.res-intro p{max-width:580px;margin:0 auto}
.rcard{margin-bottom:20px;animation:fadeUp 0.4s ease-out both}
.rh{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.ri{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
.rh-text h3{margin-bottom:0}
.rh-text span{font-size:0.79rem;color:var(--txt3)}
.domain-desc{background:var(--cream);border:1px solid var(--border);border-radius:var(--rs);padding:14px 18px;margin-bottom:14px;font-size:0.88rem;color:var(--txt2);line-height:1.6}
.domain-desc .prevalence{display:block;margin-top:6px;font-size:0.82rem;color:var(--txt3);font-style:italic}

.svis{margin:14px 0;position:relative}
.sb-bg{height:11px;background:var(--peach);border-radius:6px;overflow:visible;position:relative}
.sb-fill{height:100%;border-radius:6px;transition:width 1s ease}
.sb-th{position:absolute;top:-5px;width:2px;height:21px;background:var(--terra);opacity:0.5}
.sb-thl{position:absolute;top:18px;font-size:0.68rem;color:var(--terra);white-space:nowrap;transform:translateX(-50%)}
.sb-labels{display:flex;justify-content:space-between;margin-top:5px;font-size:0.76rem;color:var(--txt3)}
.score-big{display:flex;align-items:baseline;gap:8px;margin-top:8px}
.score-big .num{font-family:'Fraunces',serif;font-size:1.8rem;font-weight:700;color:var(--forest)}
.score-big .ctx{font-size:0.88rem;color:var(--txt3)}

.interp{border-radius:var(--r);padding:18px 22px;margin:10px 0}
.interp h4{font-family:'Fraunces',serif;font-weight:600;color:var(--forest);margin-bottom:6px;font-size:0.98rem}
.interp p,.interp li{font-size:0.92rem;color:var(--txt2);line-height:1.6}
.interp ul{margin:8px 0;padding-left:18px}
.interp li{margin-bottom:4px}
.interp.sum{background:var(--lt-sage)}
.interp.str{background:linear-gradient(135deg,rgba(183,201,168,0.15),rgba(201,169,110,0.06));border-left:4px solid var(--gold)}
.interp.act{background:linear-gradient(135deg,rgba(201,184,217,0.1),rgba(255,232,214,0.1));border-left:4px solid var(--lav)}

.lvl{display:inline-block;padding:3px 11px;border-radius:20px;font-size:0.76rem;font-weight:600;letter-spacing:0.03em;margin-left:8px}
.lvl-a{background:rgba(196,112,75,0.12);color:var(--terra)}
.lvl-m{background:rgba(201,169,110,0.18);color:#9A7B3C}
.lvl-l{background:rgba(183,201,168,0.25);color:var(--deep-sage)}

/* Resonance summary in results */
.resonance-card{background:linear-gradient(135deg,rgba(212,149,106,0.08),rgba(196,112,75,0.05));border-radius:var(--rl);padding:28px;margin:24px 0;border:1px solid rgba(212,149,106,0.15)}
.resonance-card h3{color:var(--forest);margin-bottom:8px}
.resonance-card>p{font-size:0.9rem;margin-bottom:14px}
.resonance-item{padding:10px 0;border-bottom:1px solid var(--border);font-size:0.9rem;color:var(--txt2);display:flex;gap:8px;align-items:flex-start}
.resonance-item:last-child{border-bottom:none}
.resonance-item .ri-heart{color:var(--soft-terra);flex-shrink:0;margin-top:2px}
.resonance-item .ri-section{font-size:0.75rem;color:var(--txt3);display:block;margin-top:2px}

/* Radar */
.radar-wrap{text-align:center;margin:24px 0 32px;animation:fadeUp 0.5s ease-out}
.radar-wrap svg{max-width:380px;width:100%}

/* Co-occurrence */
.cocard{background:linear-gradient(135deg,rgba(201,184,217,0.12),rgba(183,201,168,0.08));border-radius:var(--rl);padding:28px;margin:24px 0;border:1px solid var(--border)}
.cocard h3{color:var(--forest);margin-bottom:12px}
.co-item{margin-bottom:14px}
.co-item h4{font-family:'Fraunces',serif;font-size:0.95rem;color:var(--brown);margin-bottom:4px}
.co-item p{font-size:0.9rem}

/* Clinician */
.clinician-card{background:linear-gradient(135deg,rgba(255,232,214,0.3),rgba(183,201,168,0.1));border-radius:var(--rl);padding:28px;margin:24px 0;border:1px solid var(--border)}
.clinician-card h3{color:var(--forest);margin-bottom:14px}
.clinician-card p,.clinician-card li{font-size:0.92rem;color:var(--txt2);line-height:1.6}
.clinician-card ul{padding-left:18px;margin:8px 0}
.clinician-card li{margin-bottom:5px}

/* Share letter */
.letter-card{background:var(--card);border-radius:var(--rl);padding:28px;margin:24px 0;border:1px solid var(--border)}
.letter-card h3{color:var(--forest);margin-bottom:8px}
.letter-card>p{font-size:0.9rem;margin-bottom:14px}
.letter-body{background:var(--cream);border:1px solid var(--border);border-radius:var(--r);padding:24px;font-size:0.92rem;color:var(--txt2);line-height:1.7;white-space:pre-wrap;max-height:400px;overflow-y:auto}
.letter-actions{margin-top:14px;display:flex;gap:10px;flex-wrap:wrap}
.letter-copied{font-size:0.82rem;color:var(--deep-sage);margin-left:8px}

/* Resources */
.res-section{margin:20px 0}
.res-section h4{font-family:'Fraunces',serif;font-size:0.95rem;color:var(--brown);margin-bottom:6px}
.res-section p,.res-section a{font-size:0.88rem}
.res-section a{color:var(--deep-sage);text-decoration:none}
.res-section a:hover{text-decoration:underline}

.final-box{text-align:center;padding:32px;background:linear-gradient(135deg,var(--lt-sage),rgba(201,184,217,0.1));border-radius:var(--rl);margin-top:28px}
.final-box h3{font-family:'Fraunces',serif;color:var(--forest);font-size:1.2rem;margin-bottom:10px}
.final-box p{font-size:0.92rem;max-width:560px;margin:0 auto;line-height:1.7}

.refs{margin-top:32px;padding-top:20px;border-top:1px solid var(--border)}
.refs h3{font-size:0.92rem;margin-bottom:10px;color:var(--txt3)}
.refs p{font-size:0.78rem;color:var(--txt3);line-height:1.5;margin-bottom:5px}
.credits{margin-top:22px;padding-top:16px;border-top:1px solid var(--border);text-align:center}
.credits p{font-size:0.82rem;color:var(--txt3)}
.credits a{color:var(--deep-sage);text-decoration:none}
.credits a:hover{text-decoration:underline}
.legal{margin-top:18px;padding:18px 22px;border-radius:var(--r);background:rgba(196,112,75,0.05);border:1px solid rgba(196,112,75,0.1)}
.legal p{font-size:0.74rem;color:var(--txt3);line-height:1.5}
.legal strong{color:var(--txt2)}

/* Dyslexia-friendly mode */
[data-dyslexia="true"]{font-family:'Lexend',sans-serif!important;letter-spacing:0.03em;word-spacing:0.12em}
[data-dyslexia="true"] .q-text{font-family:'Lexend',sans-serif!important;font-size:1.25rem!important;line-height:1.8!important}
[data-dyslexia="true"] .opt{font-size:1.05rem!important;padding:16px 20px!important;line-height:1.6!important}
[data-dyslexia="true"] p,[data-dyslexia="true"] li{line-height:1.85!important;letter-spacing:0.02em}
[data-dyslexia="true"] .interp p,[data-dyslexia="true"] .interp li{font-size:0.96rem!important}
[data-dyslexia="true"] .domain-desc{font-size:0.94rem!important;line-height:1.8!important}

/* Toolbar (theme + dyslexia toggles) */
.toolbar{position:fixed;top:16px;right:16px;z-index:100;display:flex;gap:8px}
.tool-btn{width:42px;height:42px;border-radius:50%;border:1.5px solid var(--border);background:var(--card);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:all 0.3s;box-shadow:var(--shd)}
.tool-btn:hover{transform:scale(1.08);box-shadow:var(--shd2)}
.tool-btn.active{border-color:var(--deep-sage);background:var(--lt-sage)}

/* Keyboard hints */
.kbd-hint{display:none;font-size:0.7rem;color:var(--txt3);margin-left:auto;padding:2px 7px;border-radius:4px;background:var(--border);font-family:monospace;font-weight:600}
@media(hover:hover)and(pointer:fine){.kbd-hint{display:inline-block}}

/* Time estimate */
.time-est{font-size:0.82rem;color:var(--txt3);text-align:center;margin-top:6px;font-style:italic}

/* Skip transitions link */
.skip-link{font-size:0.82rem;color:var(--txt3);cursor:pointer;border:none;background:none;font-family:'DM Sans',sans-serif;text-decoration:underline;margin-top:12px;transition:color 0.2s}
.skip-link:hover{color:var(--txt)}

.spg{display:flex;gap:3px;margin-bottom:6px;height:4px}
.sg{flex:1;border-radius:2px;background:var(--peach);transition:background .3s}
.sg.dn{background:var(--sage)}.sg.cur{background:var(--deep-sage)}
.rvg{display:grid;grid-template-columns:repeat(auto-fill,minmax(36px,1fr));gap:4px;margin:16px 0}
.rvd{width:36px;height:36px;border-radius:8px;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.7rem;cursor:pointer;transition:all .2s;font-weight:500;color:var(--txt3);position:relative}
.rvd.ans{background:var(--lt-sage);border-color:var(--sage);color:var(--deep-sage)}
.rvd.un{background:rgba(196,112,75,.08);border-color:rgba(196,112,75,.3);color:var(--terra)}
.rvd.fl::after{content:'\2665';position:absolute;top:-4px;right:-2px;font-size:8px;color:var(--soft-terra)}
.rvsl{font-size:.78rem;color:var(--txt3);font-weight:600;margin:12px 0 6px;text-transform:uppercase;letter-spacing:.04em}
.abg{margin-bottom:20px}
.abg label{display:block;font-family:'Fraunces',serif;font-size:1rem;color:var(--forest);margin-bottom:10px;font-weight:400}
.abo{display:flex;flex-wrap:wrap;gap:8px}
.abi{padding:10px 16px;border-radius:var(--rs);border:1.5px solid var(--border);background:var(--card);font-family:'DM Sans',sans-serif;font-size:.92rem;color:var(--txt);cursor:pointer;transition:all .2s}
.abi:hover{border-color:var(--sage);background:var(--lt-sage)}
.abi.sel{border-color:var(--deep-sage);background:var(--lt-sage);font-weight:500;color:var(--forest)}
.rbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:16px;padding:14px 18px;background:rgba(201,169,110,.06);border-radius:var(--rs);border:1px solid rgba(201,169,110,.15)}
.rbar input{flex:1;min-width:160px;padding:8px 12px;border-radius:var(--rs);border:1.5px solid var(--border);font-family:'DM Sans',sans-serif;font-size:.88rem;background:var(--card);color:var(--txt);outline:none}
.rbar input:focus{border-color:var(--deep-sage)}
.sbtn{padding:8px 16px;border-radius:20px;border:1px solid var(--sage);background:var(--card);font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:500;cursor:pointer;color:var(--forest)}
.sbtn.pr{background:var(--deep-sage);color:white;border:none}
.shbox{background:linear-gradient(135deg,rgba(183,201,168,.2),rgba(201,169,110,.08));border:2px solid var(--sage);border-radius:var(--rl);padding:24px;margin-bottom:24px;animation:fadeUp .5s ease-out}
.shbox h3{color:var(--forest);margin-bottom:8px}.shbox p{font-size:.92rem;line-height:1.6}
.mcd{border-radius:var(--rl);padding:24px;margin:24px 0;border:1px solid var(--border)}
.mcd.cn{background:linear-gradient(135deg,rgba(196,112,75,.06),rgba(255,232,214,.15));border-color:rgba(196,112,75,.2)}
.mcd.ok{background:var(--lt-sage)}.mcd h3{color:var(--forest);margin-bottom:8px}.mcd p{font-size:.92rem;line-height:1.6}

/* ── SCORING ── */
function computeScores(answers){
  const s={};Object.keys(DOMAINS).forEach(d=>s[d]=0);
  s.mood_phq=0;s.mood_gad=0;
  QUESTIONS.forEach((q,i)=>{const v=answers[i];if(v===null)return;
    q.domains.forEach(dom=>{
      if(dom==='autism'){if(q.scoring==='agree'&&v>=2)s.autism++;else if(q.scoring==='disagree'&&v<=1)s.autism++}
      else if(dom==='adhd'){if(v>=2)s.adhd++}
      else if(dom==='mood_phq'||dom==='mood_gad'){s[dom]+=v}
      else{if(q.scoring==='disagree'){const mx=Math.max(...SCALES[q.scale].map(o=>o.value));s[dom]+=(mx-v)}else{s[dom]+=Math.min(v,3)}}
    });
  });return s;
}

function getFeedback(domain,score){
  const d=DOMAINS[domain],pct=score/d.maxScore;
  const level=score>=d.threshold?'above':pct>=0.35?'moderate':'low';
  return{level,...FB[domain][level]};
}

/* ── CO-OCCURRENCE ── */
function getCoOccurrences(fb){
  const above=Object.entries(fb).filter(([,f])=>f.level==='above').map(([d])=>d);
  const r=[],has=d=>above.includes(d);
  if(has('autism')&&has('adhd'))r.push({title:'Autism + ADHD (sometimes called "AuDHD")',text:"This is one of the most common combinations, with 50 to 70% co-occurrence in research. ADHD craves novelty while autistic traits crave routine, creating an internal tug-of-war. Understanding both together, rather than separately, is key."});
  if(has('adhd')&&has('dyslexia'))r.push({title:'ADHD + Dyslexia',text:"Roughly 30 to 40% of people with dyslexia also have ADHD. Attention difficulties compound decoding challenges. Assistive technology becomes especially valuable."});
  if(has('dyslexia')&&has('dyscalculia'))r.push({title:'Dyslexia + Dyscalculia',text:"These frequently co-occur, reflecting shared differences in symbolic processing. Multi-sensory and technology-assisted approaches are especially important."});
  if(has('adhd')&&has('dyspraxia'))r.push({title:'ADHD + Dyspraxia',text:"This pairing amplifies restlessness, disorganization, and difficulties with sequenced physical steps. Occupational therapy combined with ADHD strategies tends to be particularly effective."});
  if(has('sensory')&&has('autism'))r.push({title:'Sensory Sensitivity + Autism',text:"Heightened sensory processing is nearly universal in autistic adults. Understanding that your sensory needs are neurological, not a matter of preference, can be deeply validating."});
  if(has('execfn')&&has('adhd'))r.push({title:'Executive Function + ADHD',text:"Executive function challenges are so central to ADHD that many researchers consider them its core. External scaffolding is not optional but essential. These are among the most treatable aspects."});
  if(has('masking')&&(has('autism')||has('adhd')))r.push({title:'Masking + Autism/ADHD traits',text:"High masking alongside elevated neurodivergent traits is common in late-identified adults. Your trait scores may underestimate the full picture. A clinician experienced with masking is essential."});
  if(has('childhood')&&above.filter(d=>d!=='childhood'&&d!=='masking').length>0)r.push({title:'Childhood patterns + adult traits',text:"Elevated childhood patterns combined with adult trait scores strengthens the case for a neurodevelopmental origin, not something that started recently."});
  if(above.length>=3&&r.length===0)r.push({title:'Multiple elevated areas',text:"Several domains scored high. Overlapping profiles are actually the norm in neurodivergent adults. A comprehensive neuropsychological evaluation can map how these interact in your specific case."});
  return r;
}

/* ── SHARE LETTER GENERATOR ── */
function generateShareLetter(feedback,scores){
  const above=Object.keys(DOMAINS).filter(d=>feedback[d].level==='above');
  const areaNames=above.map(d=>DOMAINS[d].label);
  let letter=`Dear [name],\n\nI recently took some time to explore something I have been wondering about for a while. I completed a self-assessment tool that screens for several types of neurodivergence, and I wanted to share what I found with you, because you are someone I trust.\n\n`;
  if(above.length>0){
    letter+=`My results suggest that I may have traits consistent with ${areaNames.join(', ').replace(/, ([^,]*)$/,' and $1')}. `;
    letter+=`This does not mean something is wrong with me. It means my brain may work differently from what is typically expected, and that difference might explain some things I have struggled with or wondered about.\n\n`;
    letter+=`What I would appreciate from you:\n`;
    letter+=`- Patience, as I learn more about what this means for me\n`;
    letter+=`- Understanding that some things that seem easy for others may require more energy from me\n`;
    letter+=`- Support if I decide to pursue a formal evaluation\n`;
    letter+=`- Knowing that sharing this with you is itself a vulnerable step, and I appreciate you hearing me out\n\n`;
  }else{
    letter+=`My results did not show strong patterns in any single area, but the process itself was valuable. It helped me understand that some things I experience are shared by many others, and that exploring how my mind works is a worthwhile journey.\n\n`;
  }
  letter+=`This is not a diagnosis. It is a starting point for understanding myself better. I may decide to follow up with a professional, and I may not. Either way, it helped to look at these patterns honestly.\n\nThank you for being someone I can share this with.`;
  return letter;
}

/* ── RADAR CHART ── */
function RadarChart({scores}){
  const D=['autism','adhd','sensory','dyslexia','dyscalculia','dyspraxia','execfn'];
  const n=D.length,cx=190,cy=175,R=130,step=(2*Math.PI)/n,start=-Math.PI/2;
  function pol(i,r){const a=start+i*step;return[cx+r*Math.cos(a),cy+r*Math.sin(a)]}
  const rings=[0.25,0.5,0.75,1.0].map(f=>{const pts=D.map((_,i)=>pol(i,R*f).join(',')).join(' ');return<polygon key={f} points={pts} fill="none" stroke="var(--border)" strokeWidth="0.8"/>});
  const axes=D.map((_,i)=>{const[x,y]=pol(i,R);return<line key={i} x1={cx} y1={cy} x2={x} y2={y} stroke="var(--border)" strokeWidth="0.6"/>});
  const thPts=D.map((d,i)=>pol(i,R*(DOMAINS[d].threshold/DOMAINS[d].maxScore)).join(',')).join(' ');
  const sPts=D.map((d,i)=>pol(i,R*Math.min(scores[d]/DOMAINS[d].maxScore,1)).join(',')).join(' ');
  const labels=D.map((d,i)=>{const[x,y]=pol(i,R+22);const dom=DOMAINS[d];const pct=scores[d]/dom.maxScore;const col=pct>=dom.threshold/dom.maxScore?'#C4704B':'var(--txt3)';const fw=pct>=dom.threshold/dom.maxScore?'600':'400';return<text key={d} x={x} y={y} textAnchor="middle" dominantBaseline="middle" fontSize="11" fill={col} fontWeight={fw} fontFamily="DM Sans,sans-serif">{dom.icon} {dom.label.split('/')[0].split('(')[0].trim()}</text>});
  return(<div className="radar-wrap"><svg viewBox="0 0 380 360">{rings}{axes}<polygon points={thPts} fill="none" stroke="#C4704B" strokeWidth="1.2" strokeDasharray="4,3" opacity="0.5"/><polygon points={sPts} fill="rgba(122,155,104,0.2)" stroke="#7A9B68" strokeWidth="2.2"/>{D.map((d,i)=>{const f=Math.min(scores[d]/DOMAINS[d].maxScore,1);const[x,y]=pol(i,R*f);return<circle key={d} cx={x} cy={y} r="4.5" fill="#7A9B68" stroke="white" strokeWidth="1.5"/>})}{labels}</svg><p style={{fontSize:'0.8rem',color:'var(--txt3)',marginTop:'4px'}}>Green area = your profile · Dashed line = screening thresholds</p></div>);
}

      <div className="card qc" key={qi}>
        <span className="q-tag" style={{background:section.bg,color:section.color}}>{section.label}</span>
        {q.consolidated&&<span className="q-multi-tag">Multi-domain</span>}
        <div className="q-num">Question {qi+1} of {totalQ}</div>
        <div className="q-text">{q.text}</div>
        <div className="opts">
          {options.map((opt,oi)=><button key={opt.value} className={`opt ${sv===opt.value?'sel':''}`} onClick={()=>selectAnswer(opt.value)}>{opt.label}<span className="kbd-hint">{oi+1}</span></button>)}
        </div>
        <div className="q-footer">
          <button className={`resonate-btn ${resonated.has(qi)?'active':''}`} onClick={toggleResonate}>
            <span className="heart">{resonated.has(qi)?'♥':'♡'}</span> This resonates with me
          </button>
          <div className="qnav">
            <button className="nb nb-prev" onClick={goPrev} disabled={isFirst}>← Back</button>
            {isLast?<button className="nb nb-next" onClick={()=>setScreen('review')} disabled={sv===null}>Review answers</button>
            :<span className="q-hint">{sv!==null?'':'Select an answer'}</span>}
          </div>
        </div>
      </div>
    </div>);
  }

  /* ──── REVIEW ──── */
  if(screen==='review'){
    const unanswered=answers.filter(a=>a===null).length;
    return(
    <div className="app">
      <div className="toolbar"><button className="tool-btn" onClick={toggleTheme}>{dark?'\u2600\uFE0F':'\u{1F319}'}</button><button className={"tool-btn "+(dyslexiaMode?'active':'')} onClick={toggleDyslexia}>Aa</button></div>
      <div className="card" style={{animation:'fadeUp .4s ease-out'}}>
        <h2 style={{marginBottom:'6px'}}>Review your answers</h2>
        <p style={{marginBottom:'8px',fontSize:'.9rem'}}>Tap any number to revisit. {resonated.size>0&&'\u2665 = resonated.'} {unanswered>0&&<span style={{color:'var(--terra)'}}>{unanswered} unanswered.</span>}</p>
        {sectionOrder.map(sid=>{
          const qs=QUESTIONS.map((q,i)=>({...q,idx:i})).filter(q=>q.section===sid);
          if(!qs.length)return null;
          return(<div key={sid}>
            <div className="rvsl" style={{color:SECTIONS[sid].color}}>{SECTIONS[sid].label}</div>
            <div className="rvg">{qs.map(q=>{
              const a=answers[q.idx]!==null,f=resonated.has(q.idx);
              return <button key={q.idx} className={'rvd '+(a?'ans':'un')+(f?' fl':'')}
                onClick={()=>{setQi(q.idx);setScreen('assess')}} title={q.text.substring(0,60)+'...'}>{q.idx+1}</button>
            })}</div>
          </div>);
        })}
        <div style={{marginTop:'16px',padding:'12px 16px',background:'rgba(201,169,110,.06)',borderRadius:'var(--rs)',border:'1px solid rgba(201,169,110,.15)'}}>
          <p style={{fontSize:'.85rem',color:'var(--txt3)'}}>Save progress:
            <button className="sbtn" style={{marginLeft:'8px'}} onClick={()=>{const c=encodeResume(answers,[...resonated],aboutYou);if(c){navigator.clipboard.writeText(c);setResumeMsg('Resume code copied!')}}}>Copy resume code</button>
          </p>
          {resumeMsg&&<p style={{fontSize:'.8rem',marginTop:'4px',color:'var(--deep-sage)'}}>{resumeMsg}</p>}
        </div>
        <div className="brow">
          <button className="btn bs" onClick={()=>{setQi(0);setScreen('assess')}}>Back to questions</button>
          <button className="btn bp" onClick={()=>setScreen('results')}>See my results</button>
        </div>
      </div>
    </div>);
  }

  /* ──── RESULTS ──── */
  if(screen==='results'){
    const phq2=scores.mood_phq||0,gad2=scores.mood_gad||0,moodConcern=phq2>=3||gad2>=3;
    const aboveDoms=sortedDomains.filter(d=>allFeedback[d].level==='above');
    const startHereDom=aboveDoms.length>=2?aboveDoms.reduce((best,d)=>(scores[d]/DOMAINS[d].maxScore)>(scores[best]/DOMAINS[best].maxScore)?d:best):null;
    const barC={above:'linear-gradient(90deg,#B7C9A8,#7A9B68)',moderate:'linear-gradient(90deg,#C9A96E,#D4956A)',low:'linear-gradient(90deg,#d4d0cb,#C9B8D9)'};
    const lvlL={above:'Above threshold',moderate:'Moderate',low:'Below threshold'};
    const lvlC={above:'lvl-a',moderate:'lvl-m',low:'lvl-l'};

    return(
    <div className="app">
      <div className="toolbar"><button className="tool-btn" onClick={toggleTheme} title="Dark mode">{dark?'☀️':'🌙'}</button><button className={`tool-btn ${dyslexiaMode?'active':''}`} onClick={toggleDyslexia} title="Dyslexia-friendly text">Aa</button></div>
      <div className="brand" style={{paddingBottom:'4px'}}><div className="brand-icon">✦</div><h1 style={{fontSize:'clamp(1.5rem,4vw,2.1rem)'}}>Your Results</h1></div>
      <div className="res-intro"><p>Here is what your responses suggest across all seven areas, presented as a starting point for self-understanding.{aboveCount>0&&` ${aboveCount} area${aboveCount>1?'s':''} scored above the screening threshold.`}</p></div>

      <RadarChart scores={scores}/>

      {startHereDom&&aboveCount>=2&&(
        <div className="shbox"><h3>Where to start</h3>
        <p>With {aboveCount} areas above threshold, <strong>{DOMAINS[startHereDom].label}</strong> may be the most impactful to explore first based on your scores.</p></div>
      )}

      {(phq2>0||gad2>0)&&(
        <div className={'mcd '+(moodConcern?'cn':'ok')}>
          <h3>{moodConcern?'Mood and anxiety may be a factor':'Mood check-in'}</h3>
          {moodConcern?<p>Your PHQ-2 ({phq2}/6) and/or GAD-2 ({gad2}/6) scores suggest current depression or anxiety, which can mimic or amplify neurodivergent traits. Consider discussing mood with a healthcare provider alongside any neurodivergence evaluation.</p>
          :<p>Your mood scores (PHQ-2: {phq2}/6, GAD-2: {gad2}/6) are below concern thresholds, suggesting your other results are less likely driven by current mood conditions.</p>}
          <p style={{fontSize:'.82rem',color:'var(--txt3)',marginTop:'8px'}}>Sources: {MOOD_INFO.phq2.source}; {MOOD_INFO.gad2.source}</p>
        </div>
      )}

      {allFeedback.masking&&allFeedback.masking.level==='above'&&aboveCount<=3&&(
        <div className="itp" style={{background:'rgba(184,160,200,.1)',borderLeft:'4px solid #B8A0C8',margin:'0 0 20px'}}>
          <h4>Important: high masking detected</h4>
          <p>High masking with relatively few elevated trait scores is a well-recognized pattern. Your screening scores may be artificially low because you suppress the very traits being measured. A formal evaluation that accounts for masking is especially important.</p>
        </div>
      )}

      {aboutYou.gender==='Woman'&&aboveCount>0&&(
        <p style={{fontSize:'.88rem',color:'var(--txt3)',marginBottom:'16px',fontStyle:'italic',textAlign:'center'}}>Research note: Autism and ADHD have historically been underdiagnosed in women, partly because original criteria were based on studies of boys. Women often mask more heavily.</p>
      )}

      {sortedDomains.map((domId,idx)=>{const d=DOMAINS[domId],fb=allFeedback[domId],sc=scores[domId],pct=(sc/d.maxScore)*100,thPct=(d.threshold/d.maxScore)*100;
        return(
        <div key={domId} className="card rcard" style={{animationDelay:`${idx*0.06}s`}}>
          <div className="rh"><div className="ri" style={{background:d.iconBg}}>{d.icon}</div><div className="rh-text"><h3>{d.label} <span className={`lvl ${lvlC[fb.level]}`}>{lvlL[fb.level]}</span></h3><span>{d.source}</span></div></div>
          <div className="domain-desc">{d.description}<span className="prevalence">{d.prevalence}</span></div>
          <div className="svis"><div className="sb-bg"><div className="sb-fill" style={{width:`${pct}%`,background:barC[fb.level]}}></div><div className="sb-th" style={{left:`${thPct}%`}}><div className="sb-thl">Threshold</div></div></div><div className="sb-labels"><span>0</span><span>{d.maxScore}</span></div></div>
          <div className="score-big"><span className="num">{sc}</span><span className="ctx">out of {d.maxScore} (threshold: {d.threshold})</span></div>
          <div className="interp sum"><h4>{fb.heading}</h4><p>{fb.summary}</p></div>
          <div className="interp str"><h4>✦ Strengths to recognize</h4><ul>{fb.strengths.map((s,i)=><li key={i}>{s}</li>)}</ul></div>
          <div className="interp act"><h4>→ Suggested next steps</h4><ul>{fb.actions.map((a,i)=><li key={i}>{a}</li>)}</ul></div>
          {fb.resources&&fb.resources.length>0&&<div className="res-section"><h4>📚 Resources</h4>{fb.resources.map((r,i)=><p key={i}>{r}</p>)}</div>}
        </div>)})}

      {/* Resonance summary */}
      {resonatedArr.length>0&&(
        <div className="resonance-card">
          <h3>♥ Questions That Resonated With You</h3>
          <p>You flagged {resonatedArr.length} question{resonatedArr.length>1?'s':''} as personally meaningful. These are included in your PDF and AI export, and can be especially valuable if you share your results with a professional.</p>
          {resonatedArr.map(i=>{const rq=QUESTIONS[i];return(<div key={i} className="resonance-item"><span className="ri-heart">♥</span><div>{rq.text}<span className="ri-section">{SECTIONS[rq.section].label}</span></div></div>)})}
        </div>)}

      {coOccurrences.length>0&&(<div className="cocard"><h3>🔗 How Your Traits Interact</h3><p style={{marginBottom:'14px',fontSize:'0.9rem'}}>Neurodivergent conditions rarely occur in isolation:</p>{coOccurrences.map((co,i)=><div key={i} className="co-item"><h4>{co.title}</h4><p>{co.text}</p></div>)}</div>)}

      {aboveCount>0&&(
        <div className="clinician-card">
          <h3>🩺 Preparing for a Professional Conversation</h3>
          <p>If you decide to seek a formal evaluation:</p>
          <ul>
            <li><strong>Who to see:</strong> A clinical psychologist, psychiatrist, or neuropsychologist experienced with adult neurodivergence. For dyslexia or dyscalculia specifically, an educational psychologist is typically the specialist.</li>
            <li><strong>What to bring:</strong> Your PDF report from this tool, any school reports from childhood if available, and notes about how these patterns affect your daily life now.</li>
            <li><strong>What to say:</strong> "I completed a validated screening tool and scored above threshold in [areas]. I would like to explore whether a formal assessment is appropriate."</li>
            <li><strong>What to expect:</strong> A thorough evaluation typically involves a clinical interview, standardized assessments, and sometimes input from people who know you well.</li>
            <li><strong>What it costs:</strong> Varies widely. In many places, a referral through a primary care physician can reduce costs. Some employers and universities provide assessment funding.</li>
          </ul>
        </div>)}

      {/* Share letter */}
      {aboveCount>0&&(
        <div className="letter-card">
          <h3>💌 Sharing With Someone You Trust</h3>
          <p>One of the hardest parts of late discovery is telling the people in your life. Here is a letter you can adapt and share:</p>
          <div className="letter-body">{shareLetter}</div>
          <div className="letter-actions">
            <button className="btn btn-s" onClick={copyLetter} style={{fontSize:'0.88rem',padding:'8px 18px'}}>📋 Copy letter</button>
            {letterCopied&&<span className="letter-copied">Copied!</span>}
          </div>
        </div>)}

      {/* Guidance when no areas are above threshold */}
      {aboveCount===0&&(
        <div className="card" style={{marginTop:'24px',animation:'fadeUp 0.5s ease-out'}}>
          <h3 style={{color:'var(--forest)',marginBottom:'14px',fontSize:'1.15rem'}}>Your scores did not cross any screening thresholds. Here is why that still matters.</h3>
          <p style={{marginBottom:'14px',lineHeight:'1.7'}}>
            You came here for a reason. Maybe something about daily life feels harder than it should, or you have
            always sensed that you experience the world a little differently. The fact that these particular screeners
            did not flag strong patterns does not mean your experience is not real. It means these specific instruments,
            at this moment, did not capture it. Here are some things worth considering:
          </p>

          <div className="interp" style={{background:'var(--lt-sage)',marginBottom:'12px'}}>
            <h4>Screening tools have limits</h4>
            <p>Self-report screeners are starting points, not final answers. They work well for identifying strong patterns, but they
            can miss people who have developed effective compensatory strategies (masking), whose traits sit just below threshold,
            or whose difficulties show up mainly under specific conditions like stress or fatigue. If your lived experience tells
            you something is there, that experience is valid data too.</p>
          </div>

          {sortedDomains.filter(d=>allFeedback[d].level==='moderate').length>0&&(
          <div className="interp" style={{background:'rgba(201,169,110,0.1)',borderLeft:'4px solid var(--gold)',marginBottom:'12px'}}>
            <h4>Your moderate areas are still worth noting</h4>
            <p>You scored in the moderate range for {sortedDomains.filter(d=>allFeedback[d].level==='moderate').map(d=>DOMAINS[d].label).join(', ').replace(/, ([^,]*)$/,' and $1')}.
            These did not cross the screening threshold, but they suggest tendencies worth understanding. Many people with
            formally diagnosed conditions initially score in the moderate range on self-report tools, particularly if they have
            strong coping mechanisms. If these areas resonate with your experience, a professional conversation could still be illuminating.</p>
          </div>)}

          <div className="interp" style={{background:'rgba(201,184,217,0.1)',borderLeft:'4px solid var(--lav)',marginBottom:'12px'}}>
            <h4>Other possibilities to explore</h4>
            <p>The seven areas covered here are not the only explanations for feeling out of step. Some other things that can
            create similar experiences:</p>
            <ul>
              <li><strong>Burnout and chronic stress</strong> can mimic ADHD and executive function difficulties. If your struggles
              are relatively recent or have worsened over time, this is worth exploring with a doctor or therapist.</li>
              <li><strong>Anxiety and depression</strong> affect concentration, energy, memory, and social comfort in ways that
              overlap significantly with several neurodivergent profiles.</li>
              <li><strong>Complex trauma or CPTSD</strong> can produce sensory sensitivity, difficulty reading social cues,
              emotional dysregulation, and executive function challenges that look very similar to ADHD or autism.</li>
              <li><strong>Giftedness</strong> (particularly in combination with another condition, sometimes called "twice exceptional")
              can create a pattern where intellectual ability masks underlying difficulties, leading to a sense of
              underperformance that is hard to explain.</li>
              <li><strong>Sleep disorders</strong> such as sleep apnea or delayed sleep phase syndrome can profoundly affect
              attention, memory, mood, and coordination.</li>
              <li><strong>Hormonal changes</strong> (including perimenopause and thyroid conditions) can trigger or amplify
              attention, mood, and cognitive difficulties that may be mistaken for neurodevelopmental conditions, or vice versa.</li>
            </ul>
          </div>

          <div className="interp" style={{background:'rgba(255,232,214,0.2)',borderLeft:'4px solid var(--soft-terra)',marginBottom:'12px'}}>
            <h4>What you can still do with these results</h4>
            <ul>
              <li><strong>Talk to your doctor.</strong> Share that you have been experiencing difficulties and explored neurodivergence as a possibility. A good clinician will take that seriously regardless of a screening score.</li>
              <li><strong>Try the strategies anyway.</strong> Many of the tools recommended for neurodivergent adults (external reminders, sensory adjustments, body doubling, structured routines) help everyone. You do not need a diagnosis to benefit from them.</li>
              <li><strong>Keep observing.</strong> Pay attention to patterns in your energy, focus, and comfort over the next few weeks. A journal of "what drained me" and "what helped" can be more revealing than any questionnaire.</li>
              <li><strong>Come back later.</strong> Your answers may be different under different circumstances. Stress, sleep, health, and life transitions all affect how these traits show up.</li>
            </ul>
          </div>

          <p style={{marginTop:'14px',lineHeight:'1.7',fontStyle:'italic',color:'var(--txt3)'}}>
            The most important thing: you paid attention to your own experience, and you took the time to investigate it.
            That is not nothing. That is the beginning of understanding yourself better, regardless of what any score says.
          </p>
        </div>
      )}

      <div className="final-box"><h3>{aboveCount>0?'You took a brave step today':'You showed up for yourself today'}</h3><p>{aboveCount>0?'Self-understanding is not a destination; it is an ongoing conversation with yourself. Whatever these results mean to you, please know: your brain is not broken. It may simply work differently from what the world expected, and that difference has real value.':'Taking this assessment was an act of self-care, regardless of the outcome. The curiosity that brought you here is itself a strength. Keep paying attention to your experience, keep asking questions, and trust that your sense of something being worth understanding is reason enough to keep exploring.'}</p></div>

      <div className="btn-row" style={{marginTop:'18px'}}>
        <button className="btn btn-s" onClick={()=>generatePDF(scores,allFeedback,coOccurrences,resonatedArr)}>📄 Download PDF</button>
        <button className="btn btn-s" onClick={downloadLLM}>🤖 Export for AI</button>
        <button className="btn btn-s" onClick={()=>window.print()}>🖨️ Print</button>
        <button className="btn btn-p" onClick={restart}>Start over</button>
      </div>
      <div className="surl">
        <span style={{fontSize:'.82rem',color:'var(--txt3)',whiteSpace:'nowrap'}}>Bookmark results:</span>
        <input readOnly value={typeof window!=='undefined'?window.location.origin+window.location.pathname+encodeScoresToHash(scores):''}/>
        <button className="btn btn-s" style={{padding:'6px 14px',fontSize:'.8rem'}} onClick={()=>{navigator.clipboard.writeText(window.location.origin+window.location.pathname+encodeScoresToHash(scores));setUrlCopied(true);setTimeout(()=>setUrlCopied(false),2000)}}>{urlCopied?'Copied!':'Copy'}</button>
      </div>

      <div className="refs">
        <h3>Sources</h3>
        <p style={{marginBottom:'10px'}}>The scales were informed by the published sources listed below, along with additional research literature, clinical and educational expertise, and other nonretrievable sources consulted during development.</p>
        <p>Allison, C., Auyeung, B., &amp; Baron-Cohen, S. (2012). Toward brief "red flags" for autism screening: The short Autism Spectrum Quotient and the short Quantitative Checklist in 1,000 cases and 3,000 controls. <em>Journal of the American Academy of Child &amp; Adolescent Psychiatry, 51</em>(2), 202-212.</p>
        <p>Aron, E. N., &amp; Aron, A. (1997). Sensory-processing sensitivity and its relation to introversion and emotionality. <em>Journal of Personality and Social Psychology, 73</em>(2), 345-368.</p>
        <p>Butterworth, B. (2003). <em>Dyscalculia screener</em>. nferNelson.</p>
        <p>Cipora, K., Hohol, M., Nuerk, H.-C., Willmes, K., Bro&#380;ek, B., Kucharzyk, B., &amp; N&#281;cka, E. (2016). Professional mathematicians differ from controls in their spatial-numerical associations. <em>Psychological Research, 80</em>, 710-726.</p>
        <p>Hull, L., Mandy, W., Lai, M.-C., Baron-Cohen, S., Allison, C., Smith, P., &amp; Petrides, K. V. (2019). Development and validation of the Camouflaging Autistic Traits Questionnaire (CAT-Q). <em>Journal of Autism and Developmental Disorders, 49</em>(3), 819-833.</p>
        <p>Kessler, R. C., Adler, L., Ames, M., Demler, O., Faraone, S., Hiripi, E., Howes, M. J., Jin, R., Secnik, K., Spencer, T., Ustun, T. B., &amp; Walters, E. E. (2005). The World Health Organization Adult ADHD Self-Report Scale (ASRS): A short screening scale for use in the general population. <em>Psychological Medicine, 35</em>(2), 245-256.</p>
        <p>Kirby, A., Edwards, L., Sugden, D., &amp; Rosenblum, S. (2010). The development and standardization of the Adult Developmental Co-ordination Disorders/Dyspraxia Checklist (ADC). <em>Research in Developmental Disabilities, 31</em>(1), 131-139.</p>
        <p>Roth, R. M., Isquith, P. K., &amp; Gioia, G. A. (2005). <em>Behavior Rating Inventory of Executive Function, Adult version</em>. Psychological Assessment Resources.</p>
        <p>Smythe, I., &amp; Everatt, J. (2001). Adult checklist. British Dyslexia Association.</p>
        <p>Vinegrad, M. (1994, March). A revised adult dyslexia checklist. <em>Educare</em>, (48), 21-23.</p>
        <p>Ward, M. F., Wender, P. H., &amp; Reimherr, F. W. (1993). The Wender Utah Rating Scale: An aid in the retrospective diagnosis of childhood attention-deficit hyperactivity disorder. <em>American Journal of Psychiatry, 150</em>(6), 885-890.</p>
        <p style={{marginTop:'14px',fontStyle:'italic'}}><strong>Methodology note:</strong> {QUESTIONS.filter(q=>q.consolidated).length} questions score into multiple domains where validated instruments share overlapping constructs. All original instrument scoring is preserved.</p>
      </div>
      <div className="credits"><p>Conceived &amp; developed by <a href="https://linkedin.com/in/beingbabu" target="_blank" rel="noopener noreferrer">Babu George</a></p></div>
      <div className="legal">
        <p><strong>LEGAL DISCLAIMER:</strong> This instrument is an experimental self-exploration tool designed for adults and provided strictly for informational and educational purposes. It is not suitable for children or young adolescents. It is NOT a medical device, diagnostic instrument, or clinical assessment, and the results do not constitute a medical diagnosis, psychological evaluation, clinical opinion, or professional advice of any kind. This tool is not intended to replace, substitute for, or serve as the basis for any professional consultation, diagnosis, or treatment. No healthcare provider-patient relationship is created through use of this tool.</p>
        <p style={{marginTop:'6px'}}>The developers, creators, and distributors of this tool (including Babu George) expressly disclaim all liability for any direct, indirect, incidental, consequential, or special damages arising from or related to the use of, reliance upon, or inability to use this tool or its results, to the fullest extent permitted by applicable law. By using this tool, you acknowledge that you do so entirely at your own risk and that you will not rely on its results as a substitute for professional evaluation. If you believe you may have a neurodevelopmental condition, please consult a qualified healthcare professional.</p>
      </div>
    </div>);
  }
  return null;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
